name: release-artifacts

# On a version tag, regenerate the hyphenation pattern artifacts from the engine
# and attach them to the GitHub Release. Manual runs (workflow_dispatch) just
# upload them as build artifacts for inspection.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile
      - run: pip install pypatgen

      - name: Test engine
        run: pnpm test

      # Builds artifacts/{hyph-hy.tex, hyph_hy_AM.dic, hyphenation.hy.json, hyph-hy.hyb}
      # from the committed corpus wordlist. PYPATGEN points at the pip-installed CLI.
      - name: Build hyphenation artifacts
        run: PYPATGEN=pypatgen ./tools/emit/build-patterns.sh

      # .hyb is best-effort: Chromium's 32-bit Minikin trie cannot hold a pattern
      # set this diverse, so it is skipped. The Minikin trio (.pat/.chr/.hyp) is
      # always attached so downstream Chrome/Android builders can run
      # mk_hyb_file.py against a corpus subset of their choosing.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vankatum-hyphenation-patterns
          if-no-files-found: warn
          path: |
            artifacts/hyph-hy.tex
            artifacts/hyph_hy_AM.dic
            artifacts/hyphenation.hy.json
            artifacts/hyph-hy.hyb
            artifacts/hyph-hy.pat.txt
            artifacts/hyph-hy.chr.txt
            artifacts/hyph-hy.hyp.txt

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/hyph-hy.tex
            artifacts/hyph_hy_AM.dic
            artifacts/hyphenation.hy.json
            artifacts/hyph-hy.hyb
            artifacts/hyph-hy.pat.txt
            artifacts/hyph-hy.chr.txt
            artifacts/hyph-hy.hyp.txt
