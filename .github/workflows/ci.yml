name: ci

# Fast feedback on every change: typecheck, lint, tests, and build. Node-only —
# the heavy pattern-generation pipeline (Python + pypatgen) runs in release.yml,
# not here.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
